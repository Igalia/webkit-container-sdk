name: Build and Publish wkdev-sdk Image
on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore: [ docs/*, README.md ]
    tags:
      - 'wkdev-sdk-*'
  pull_request:
    paths-ignore: [ docs/*, README.md ]
defaults:
  run:
    shell: bash

# Serialize same-commit runs (e.g. a release tag and the main push that
# created it both fire for the same SHA); independent commits run in parallel.
concurrency:
  group: wkdev-sdk-${{ github.sha }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: x64
            extra_test_args: ""
          - arch: arm64
            runner: arch-arm64
            # arm64 self-hosted runner doesn't ship the default shell from --shell=$SHELL.
            extra_test_args: "--shell /bin/bash"
    runs-on: [self-hosted, "${{ matrix.runner }}"]
    permissions:
      packages: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Resolve version & registry coordinates
        run: |
          VERSION=$(./scripts/helpers/print-sdk-version)
          echo "WKDEV_SDK_VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "REPO=ghcr.io/$(echo ${GITHUB_REPOSITORY_OWNER} | tr '[:upper:]' '[:lower:]')/wkdev-sdk" >> "${GITHUB_ENV}"

          if [[ "${GITHUB_REF}" == refs/tags/wkdev-sdk-* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/wkdev-sdk-}"
            if [ "${TAG_VERSION}" != "${VERSION}" ]; then
              echo "Error: git tag wkdev-sdk-${TAG_VERSION} does not match Containerfile WKDEV_SDK_VERSION=${VERSION}"
              exit 1
            fi
          fi

      - name: Install podman
        run: sudo apt-get update && sudo apt-get -y install podman fuse-overlayfs

      - name: Prune old containers/images
        run: |
          echo "Disk space before prune:"
          df -h
          echo "Pruning containers and images older than 2 weeks..."
          podman system prune --all --force --volumes --filter until=336h || true
          echo "Disk space after prune:"
          df -h

      - name: Clean unrelated images
        run: |
          podman rmi --ignore --force ${REPO}:${WKDEV_SDK_VERSION}
          podman manifest rm ${REPO}:${WKDEV_SDK_VERSION} || true
          podman rmi --ignore --force ${REPO}:${WKDEV_SDK_VERSION}_${{ matrix.arch }}

      - name: Build image
        run: |
          podman build --jobs $(nproc) --build-context scripts=./scripts \
            --build-arg WKDEV_SDK_VERSION=${WKDEV_SDK_VERSION} \
            -t ${REPO}:${WKDEV_SDK_VERSION}_${{ matrix.arch }} --arch=${{ matrix.arch }} images/wkdev_sdk
          podman image list

      - name: Test image
        run: |
          CONTAINER="wkdev-$(date +%s)"
          echo "CONTAINER=${CONTAINER}" >> "${GITHUB_ENV}"
          source ./register-sdk-on-host.sh
          wkdev-create --create-home --home ${HOME}/${CONTAINER}-home --verbose --attach --no-pull --name ${CONTAINER} --arch ${{ matrix.arch }} ${{ matrix.extra_test_args }}
          wkdev-enter -n ${CONTAINER} --exec -- git clone --depth=1 https://github.com/WebKit/WebKit.git
          wkdev-enter -n ${CONTAINER} --exec -- ./WebKit/Tools/Scripts/build-webkit --wpe --release --generate-project-only
          wkdev-enter -n ${CONTAINER} --exec -- ./WebKit/Tools/Scripts/build-webkit --gtk --release --generate-project-only

      - name: Push image
        if: startsWith(github.ref, 'refs/tags/wkdev-sdk-')
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io --username=${GITHUB_REPOSITORY_OWNER} --password-stdin
          podman push ${REPO}:${WKDEV_SDK_VERSION}_${{ matrix.arch }}

      - name: Cleanup test artifacts
        if: always()
        run: |
          if [ -n "${CONTAINER:-}" ]; then
            podman rm --force ${CONTAINER} 2>/dev/null || true
            rm -rf ${HOME}/${CONTAINER}-home || true
          fi
          # Clean up any leftover containers and home directories from previous failed runs
          podman ps -a --filter "name=^wkdev-" --format "{{.Names}}" | xargs -r podman rm --force 2>/dev/null || true
          find ${HOME} -maxdepth 1 -type d -name "wkdev-*-home" -exec rm -rf {} + 2>/dev/null || true

  deploy:
    runs-on: [self-hosted, x64]
    permissions:
      packages: write
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/wkdev-sdk-')
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Resolve version & registry coordinates
        run: |
          VERSION="${GITHUB_REF#refs/tags/wkdev-sdk-}"
          echo "WKDEV_SDK_VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "REPO=ghcr.io/$(echo ${GITHUB_REPOSITORY_OWNER} | tr '[:upper:]' '[:lower:]')/wkdev-sdk" >> "${GITHUB_ENV}"

      - name: Install podman and skopeo
        run: sudo apt-get update && sudo apt-get -y install podman fuse-overlayfs skopeo

      - name: Prune old containers/images
        run: |
          echo "Disk space before prune:"
          df -h
          echo "Pruning containers and images older than 2 weeks..."
          podman system prune --all --force --volumes --filter until=336h || true
          echo "Disk space after prune:"
          df -h

      - name: Login to registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | skopeo login ghcr.io --username=${GITHUB_REPOSITORY_OWNER} --password-stdin

      - name: Validate all architecture images exist in registry
        id: validate
        run: |
          skopeo inspect docker://${REPO}:${WKDEV_SDK_VERSION}_amd64 > /dev/null 2>&1 &
          pid_amd64=$!
          skopeo inspect docker://${REPO}:${WKDEV_SDK_VERSION}_arm64 > /dev/null 2>&1 &
          pid_arm64=$!
          rc_amd64=0; wait ${pid_amd64} || rc_amd64=$?
          rc_arm64=0; wait ${pid_arm64} || rc_arm64=$?
          [ ${rc_amd64} -eq 0 ] && echo "Validated: ${REPO}:${WKDEV_SDK_VERSION}_amd64 exists in registry" \
                                || echo "Error: Image ${REPO}:${WKDEV_SDK_VERSION}_amd64 does not exist in registry"
          [ ${rc_arm64} -eq 0 ] && echo "Validated: ${REPO}:${WKDEV_SDK_VERSION}_arm64 exists in registry" \
                                || echo "Error: Image ${REPO}:${WKDEV_SDK_VERSION}_arm64 does not exist in registry"
          if [ ${rc_amd64} -ne 0 ] || [ ${rc_arm64} -ne 0 ]; then
            echo "validation_failed=true" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "validation_failed=false" >> $GITHUB_OUTPUT

      - name: Clean up arch-specific images on validation failure (amd64)
        if: failure() && steps.validate.outputs.validation_failed == 'true'
        continue-on-error: true
        uses: bots-house/ghcr-delete-image-action@v1.1.0
        with:
          owner: ${{ github.repository_owner }}
          name: wkdev-sdk
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ env.WKDEV_SDK_VERSION }}_amd64

      - name: Clean up arch-specific images on validation failure (arm64)
        if: failure() && steps.validate.outputs.validation_failed == 'true'
        continue-on-error: true
        uses: bots-house/ghcr-delete-image-action@v1.1.0
        with:
          owner: ${{ github.repository_owner }}
          name: wkdev-sdk
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ env.WKDEV_SDK_VERSION }}_arm64

      - name: Pull arch-specific images to local storage
        run: |
          declare -A pids
          for arch in amd64 arm64; do
            podman pull ${REPO}:${WKDEV_SDK_VERSION}_${arch} &
            pids[${arch}]=$!
          done
          for arch in amd64 arm64; do
            wait ${pids[${arch}]} || { echo "${arch} pull failed"; exit 1; }
          done

      - name: Delete arch-specific tag (amd64)
        uses: bots-house/ghcr-delete-image-action@v1.1.0
        with:
          owner: ${{ github.repository_owner }}
          name: wkdev-sdk
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ env.WKDEV_SDK_VERSION }}_amd64

      - name: Delete arch-specific tag (arm64)
        uses: bots-house/ghcr-delete-image-action@v1.1.0
        with:
          owner: ${{ github.repository_owner }}
          name: wkdev-sdk
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ env.WKDEV_SDK_VERSION }}_arm64

      - name: Create multi-arch manifest from local storage
        run: |
          podman manifest create ${REPO}:${WKDEV_SDK_VERSION}
          for arch in amd64 arm64; do
            podman manifest add ${REPO}:${WKDEV_SDK_VERSION} containers-storage:${REPO}:${WKDEV_SDK_VERSION}_${arch}
          done

      - name: Push self-contained multi-arch manifest with all layers
        run: |
          podman manifest push --all ${REPO}:${WKDEV_SDK_VERSION} docker://${REPO}:${WKDEV_SDK_VERSION}
